<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body -->
  <rect x="18" y="10" width="28" height="44" rx="4" fill="#111"/>
  <!-- Top notch -->
  <rect x="26" y="13" width="12" height="2" rx="1" fill="#333"/>
  <!-- Bottom line / home area -->
  <rect x="27" y="48" width="10" height="2" rx="1" fill="#333"/>

  <!-- Gear (settings) -->
  <g transform="translate(38,38) scale(0.9)">
    <circle cx="0" cy="0" r="7" fill="#ffffff" stroke="#c0c0c0" stroke-width="1.5"/>
    <!-- Teeth -->
    <g stroke="#c0c0c0" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-11" x2="0" y2="-8"/>
      <line x1="0" y1="11" x2="0" y2="8"/>
      <line x1="-11" y1="0" x2="-8" y2="0"/>
      <line x1="11" y1="0" x2="8" y2="0"/>
      <line x1="-8" y1="-8" x2="-6" y2="-6"/>
      <line x1="8" y1="-8" x2="6" y2="-6"/>
      <line x1="-8" y1="8" x2="-6" y2="6"/>
      <line x1="8" y1="8" x2="6" y2="6"/>
    </g>
    <!-- Inner hole -->
    <circle cx="0" cy="0" r="3" fill="#e6e6e6"/>
  </g>
</svg>
